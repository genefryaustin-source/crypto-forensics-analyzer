[theme]
primaryColor = "#ff4444"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#1e1e2e"
textColor = "#FFFFFF"
font = "monospace"

[client]
showErrorDetails = true
toolbarMode = "viewer"

[logger]
level = "info"

[server]
port = 8501
headless = true
runOnSave = true
maxUploadSize = 200

[browser]
gatherUsageStats = false